<div class="topbar">
  <div>
    <p class="eyebrow">Evidence-first inspection</p>
    <h1>{{ page_title }}</h1>
  </div>
  <div class="topbar-actions">
    <span class="system-pill">Read-only</span>
    <span class="system-pill muted-pill">SQLite</span>
    <div class="theme-switcher">
      <select id="theme-select" onchange="applyTheme(this.value)" style="background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-left: 8px;">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="system">System</option>
      </select>
    </div>
  </div>
</div>
