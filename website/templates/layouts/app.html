<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | {{ app_name }}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/layout.css') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/components.css') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/pages.css') }}">
  </head>
  <body>
    <div class="shell">
      {% include "components/sidebar.html" %}
      <div class="workspace">
        {% include "components/topbar.html" %}
        <main class="content page-enter">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
    <script>
      // Theme switcher functionality
      function applyTheme(theme) {
        const root = document.documentElement;
        
        // Remove all theme classes
        root.classList.remove('theme-dark', 'theme-light', 'theme-system');
        
        // Apply selected theme
        if (theme === 'system') {
          const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          root.classList.add(`theme-${systemPrefersDark ? 'dark' : 'light'}`);
        } else {
          root.classList.add(`theme-${theme}`);
        }
        
        // Save to localStorage
        localStorage.setItem('theme', theme);
        
        // Update select element
        const select = document.getElementById('theme-select');
        if (select) {
          select.value = theme;
        }
      }
      
      function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
          if (localStorage.getItem('theme') === 'system') {
            applyTheme('system');
          }
        });
      }
      
      // Initialize theme on load
      document.addEventListener('DOMContentLoaded', initTheme);
    </script>
  </body>
</html>
